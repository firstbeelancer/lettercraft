server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # gzip
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml application/wasm;

  # API proxy — фронт дёргает /api/v1, nginx проксирует на api:3001
  location /api/ {
    proxy_pass http://api:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
    client_max_body_size 15m;
  }

  # PWA: long cache for hashed assets
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # PWA: не кэшировать manifest/sw
  location ~* (manifest\.webmanifest|sw\.js|workbox-.*\.js)$ {
    expires off;
    add_header Cache-Control "no-store";
    add_header Service-Worker-Allowed "/";
  }

  # healthcheck
  location = /healthz {
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }
}
