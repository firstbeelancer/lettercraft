server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # gzip
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml application/wasm;

  # PWA: long cache for hashed assets
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # PWA: не кэшировать manifest/sw
  location ~* (manifest\.webmanifest|sw\.js|workbox-.*\.js)$ {
    expires off;
    add_header Cache-Control "no-store";
    add_header Service-Worker-Allowed "/";
  }

  # healthcheck
  location = /healthz {
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }
}
