name: lettercraft

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - lettercraft-net

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      APP_URL: ${APP_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      STORAGE_ROOT: /data/lettercraft-storage
      PORT: 3001
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      # Dev: если true, magic link возвращается в ответе API (для тестов без SMTP)
      MAGIC_LINK_IN_RESPONSE: ${MAGIC_LINK_IN_RESPONSE}
    volumes:
      - lettercraft-storage:/data/lettercraft-storage
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - lettercraft-net

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - lettercraft-net

volumes:
  db-data:
  lettercraft-storage:

networks:
  lettercraft-net:
    driver: bridge
